<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore in JS</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- PAGINA -->
    <div id="container">
        <h1>Contatore in<br><span class="java-text">JAVASCRIPT</span></h1>
        <h3>© SalvatoreDeRoma_2026</h3>

        <!-- rettangolo di gioco -->
        <main class="box-game">
            <p class="contatore">0</p>
        </main>

        <!-- BOTTONI CONTATORE -->
         <div class="box-button">
            <button id="decremento" class="bottone" onclick="decremento()"><p>-</p></button>
            <button id="incremento" class="bottone" onclick="incremento()"><p>+</p></button>
         </div>
         
         <div class="message">
            <h2 class="title-alert">overload memory</h2>
         </div>
         

         <footer>
            <h3 class="coin-text">insert coin(s)</h3>
         </footer>
        
    </div>

    <!-- javascript -->
     <script src="./js/contatore.js" defer></script>
</body>
</html>
