<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore in JS</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- PAGINA -->
    <div id="container-grid">
        <header id="header" class="grid-item">
            <h1>© Contatore+</h1>
            <div id="dark-mode"><span>dark mode</span></div>
        </header>

        <main id="hero-section" class="grid-item">
            <div id="box-main">
                <div class="title-counter">
                    + COUNTER +
                </div>

                <div class="box-contatore">
                    
                    <div class="round uno"></div>
                    <div class="round due"></div>
                    <div class="round tre"></div>
                    <div class="round quattro"></div>

                    <div class="box-numero">
                        <p class="contatore"></p>
                    </div>
                </div>
                <span class="nointiendo">Nointiendo</span>
                <div class="box-button">
                    <!-- <button class="btn reset">RESET</button>
                    <button class="btn">-</button>
                    <button class="btn">+</button> -->
                </div>
                
            </div>
        </main>



    </div>

    <!-- javascript -->
    <script src="./js/contatore.js"></script>
     
</body>
</html>
